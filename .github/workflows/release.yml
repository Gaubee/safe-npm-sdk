# Publish safe-npm-sdk to the npm registry via **trusted publishing** (OIDC).
#
# No long-lived npm token. npm v11.5.1+ supports trusted publishing: GitHub
# Actions mints a short-lived OIDC JWT, npm's trusted-publisher config on the
# package (configured once on npmjs.com) verifies it, and the publish is
# authenticated by that identity alone. Provenance is attached automatically.
#
# Triggered by:
#   - pushing a `v*` tag (the normal path — see `pnpm release`)
#   - workflow_dispatch (manual override from the Actions tab)
#
# The job runs under the `npm-release` GitHub Environment, which is where
# trusted-publisher protection / required reviewers can be configured on the
# repo side. The matching trusted-publisher declaration lives on the npm
# package settings page (repo = Gaubee/safe-npm-sdk, workflow file =
# release.yml, default branch = main).
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    name: build + publish
    runs-on: ubuntu-latest
    environment: npm-release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      # npm bundled with Node 24 is older than 11.5.1; trusted publishing needs
      # npm >= 11.5.1, so upgrade it globally before publishing.
      - name: Install npm with trusted publishing support
        run: npm install -g "npm@^11.10.0"

      - run: vp install
      - run: vp check
      - run: vp test
      - run: vp run --filter safe-npm-sdk build

      # Guard: the pushed tag must agree with packages/safe-npm-sdk/package.json.
      # Skipped for workflow_dispatch (no tag to compare against).
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          pkg_version=$(node -p "require('./packages/safe-npm-sdk/package.json').version")
          tag_version="${GITHUB_REF#refs/tags/v}"
          echo "package.json version: $pkg_version"
          echo "pushed tag version:    $tag_version"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::tag '$tag_version' does not match package.json version '$pkg_version'"
            exit 1
          fi

      - name: Publish to npm (trusted publishing, no token)
        working-directory: packages/safe-npm-sdk
        run: npm publish --provenance --access public
